<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Filmes</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>🎬 Cadastro de Filmes</h1>
    </header>

    <main>

        
        <section class="cadastro">

            <h2>Novo Filme</h2>

            <form id="formFilme">

                <label for="titulo">Título</label>
                <input type="text" id="titulo" placeholder="Digite o título do filme" required>

                <label for="genero">Gênero</label>
                <select id="genero" required>
                    <option value="">Selecione</option>
                    <option>Ação</option>
                    <option>Comédia</option>
                    <option>Drama</option>
                    <option>Ficção Científica</option>
                    <option>Romance</option>
                    <option>Terror</option>
                    <option>Suspense</option>
                </select>

                <label for="ano">Ano de Lançamento</label>
                <input type="number" id="ano" min="1900" max="2100" required>

                <label for="diretor">Diretor</label>
                <input type="text" id="diretor" required>

                <label for="duracao">Duração (minutos)</label>
                <input type="number" id="duracao" required>

                <button type="submit">Cadastrar Filme</button>

            </form>

        </section>

        
        <section class="lista">

            <h2>Filmes Cadastrados</h2>

            <table>

                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Gênero</th>
                        <th>Ano</th>
                        <th>Diretor</th>
                        <th>Duração</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="listaFilmes">
                    
                </tbody>

            </table>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 - Sistema de Cadastro de Filmes</p>
    </footer>

    
</body>
</html>
